<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixel Portrait Maker</title>
<style>
  :root {
    --bg: #1e1e24;
    --panel: #2a2a33;
    --border: #3d3d49;
    --text: #eaeaf0;
    --muted: #9a9aa8;
    --accent: #e8734a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    padding: 14px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { margin: 0; font-size: 20px; letter-spacing: 0.5px; }
  header span { color: var(--muted); font-size: 13px; }
  main {
    display: flex;
    gap: 18px;
    padding: 18px;
    align-items: flex-start;
  }
  .controls {
    width: 290px;
    flex-shrink: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .controls label.field { display: block; font-size: 13px; color: var(--muted); }
  .controls .value { float: right; color: var(--text); font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; margin-top: 6px; accent-color: var(--accent); }
  .check { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
  .check input { accent-color: var(--accent); width: 16px; height: 16px; }
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 22px 12px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  #dropzone:hover, #dropzone.over { border-color: var(--accent); color: var(--text); }
  #dropzone strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 14px; }
  #fileInput { display: none; }
  button {
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 11px;
    border-radius: 8px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.4; cursor: default; }
  #info { font-size: 13px; color: var(--muted); min-height: 18px; }
  #legend { display: flex; flex-direction: column; gap: 5px; max-height: 260px; overflow-y: auto; }
  #legend h3 { margin: 0 0 4px; font-size: 13px; color: var(--muted); font-weight: 600; }
  .swatch-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .swatch-row .num { width: 22px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
  .swatch-row .sw { width: 26px; height: 18px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0; }
  .swatch-row .hex { color: var(--muted); font-family: Consolas, monospace; font-size: 12px; }
  .preview {
    flex: 1;
    min-width: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
  }
  #outCanvas { max-width: 100%; max-height: 82vh; display: none; }
  select, #customPaper input {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 8px; font-size: 13px; width: 100%; margin-top: 6px;
  }
  #customPaper { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
  #customPaper[hidden] { display: none; }
  #customPaper input { margin-top: 0; }
  #placeholder { color: var(--muted); font-size: 15px; text-align: center; line-height: 1.7; }
  h3.sec { margin: 4px 0 0; font-size: 13px; color: var(--muted); font-weight: 600; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); font-weight: 500; font-size: 13px; padding: 8px; }
  button.secondary:hover { border-color: var(--accent); }
  #historyNote { font-size: 12px; color: var(--muted); }
  #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-height: 240px; overflow-y: auto; }
  .g-item { position: relative; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; cursor: pointer; aspect-ratio: 1; background: #fff; }
  .g-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .g-del {
    position: absolute; top: 2px; right: 2px;
    background: rgba(0,0,0,0.6); color: #fff;
    border: none; border-radius: 4px;
    width: 18px; height: 18px; font-size: 11px; line-height: 1; padding: 0;
  }
  #viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 10; }
  #viewer[hidden] { display: none; }
  .viewer-box { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; max-width: 92vw; max-height: 92vh; display: flex; flex-direction: column; gap: 10px; }
  .viewer-box img { max-width: 86vw; max-height: 76vh; object-fit: contain; background: #fff; border-radius: 6px; }
  .viewer-bar { display: flex; align-items: center; gap: 10px; }
  .viewer-bar span { flex: 1; font-size: 13px; color: var(--muted); word-break: break-all; }
  .viewer-bar button { padding: 8px 14px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>Pixel Portrait Maker</h1>
  <span>photo &rarr; one color per block &rarr; hand-drawing reference</span>
</header>
<main>
  <div class="controls">
    <div id="dropzone">
      <strong>Choose a photo</strong>
      click here or drag &amp; drop an image
    </div>
    <input type="file" id="fileInput" accept="image/*">

    <label class="field">Grid width (blocks across) <span class="value" id="gridVal">40</span>
      <input type="range" id="gridSize" min="10" max="120" value="40">
    </label>

    <label class="field">Number of colors <span class="value" id="colorsVal">12</span>
      <input type="range" id="numColors" min="2" max="40" value="12">
    </label>

    <label class="field">Paper size
      <select id="paper">
        <option value="210x297" selected>A4 (210 × 297 mm)</option>
        <option value="148x210">Half A4 / A5 (148 × 210 mm)</option>
        <option value="297x420">A3 (297 × 420 mm)</option>
        <option value="custom">Custom…</option>
        <option value="">None (screen only)</option>
      </select>
    </label>
    <div id="customPaper" hidden>
      <input type="number" id="paperW" min="10" max="2000" value="210" placeholder="width"> ×
      <input type="number" id="paperH" min="10" max="2000" value="297" placeholder="height"> mm
    </div>

    <label class="check"><input type="checkbox" id="numbered" checked> Number each block</label>
    <label class="check"><input type="checkbox" id="gridLines" checked> Show grid lines</label>

    <button id="downloadBtn" disabled>Download PNG</button>
    <div id="info"></div>
    <div id="legend"></div>

    <h3 class="sec">History</h3>
    <button id="folderBtn" class="secondary">Connect history folder</button>
    <div id="historyNote"></div>
    <div id="gallery"></div>
  </div>

  <div class="preview">
    <div id="placeholder">No photo yet.<br>Load one on the left to see the pixel grid.</div>
    <canvas id="outCanvas"></canvas>
  </div>
</main>

<div id="viewer" hidden>
  <div class="viewer-box">
    <img id="viewerImg" alt="">
    <div class="viewer-bar">
      <span id="viewerName"></span>
      <button id="viewerDl">Download</button>
      <button id="viewerClose" class="secondary">Close</button>
    </div>
  </div>
</div>

<script>
"use strict";

const fileInput = document.getElementById("fileInput");
const dropzone = document.getElementById("dropzone");
const gridSizeEl = document.getElementById("gridSize");
const numColorsEl = document.getElementById("numColors");
const numberedEl = document.getElementById("numbered");
const gridLinesEl = document.getElementById("gridLines");
const downloadBtn = document.getElementById("downloadBtn");
const outCanvas = document.getElementById("outCanvas");
const placeholder = document.getElementById("placeholder");
const infoEl = document.getElementById("info");
const legendEl = document.getElementById("legend");

const CELL = 40; // rendered pixels per block

let sourceImg = null;
let palette = [];   // [{r,g,b,hex,count}] ordered light -> dark, index = number - 1

// ---------- image loading ----------

function loadFromSrc(src, name) {
  const img = new Image();
  img.onload = () => {
    sourceImg = img;
    dropzone.innerHTML = "<strong>" + (name || "Image loaded") + "</strong>click to choose a different photo";
    render();
  };
  img.onerror = () => { infoEl.textContent = "Could not read that file as an image."; };
  img.src = src;
}
window.loadFromSrc = loadFromSrc; // used by drag&drop and testing

function handleFile(file) {
  if (!file || !file.type.startsWith("image/")) return;
  const reader = new FileReader();
  reader.onload = e => loadFromSrc(e.target.result, file.name);
  reader.readAsDataURL(file);
}

dropzone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => handleFile(fileInput.files[0]));
dropzone.addEventListener("dragover", e => { e.preventDefault(); dropzone.classList.add("over"); });
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("over"));
dropzone.addEventListener("drop", e => {
  e.preventDefault();
  dropzone.classList.remove("over");
  handleFile(e.dataTransfer.files[0]);
});

const paperEl = document.getElementById("paper");
const paperW = document.getElementById("paperW");
const paperH = document.getElementById("paperH");

[gridSizeEl, numColorsEl, numberedEl, gridLinesEl, paperEl, paperW, paperH].forEach(el =>
  el.addEventListener("input", () => {
    document.getElementById("gridVal").textContent = gridSizeEl.value;
    document.getElementById("colorsVal").textContent = numColorsEl.value;
    document.getElementById("customPaper").hidden = paperEl.value !== "custom";
    render();
  })
);

// physical size of one block when the grid is fit onto the chosen paper,
// rotating the paper to match the image orientation
function paperInfo(gridW, gridH) {
  const v = paperEl.value;
  if (!v) return null;
  let w, h, label;
  if (v === "custom") {
    w = +paperW.value; h = +paperH.value;
    if (!w || !h) return null;
    label = w + " × " + h + " mm";
  } else {
    [w, h] = v.split("x").map(Number);
    label = paperEl.options[paperEl.selectedIndex].text;
  }
  if ((gridW > gridH) !== (w > h)) [w, h] = [h, w];
  const block = Math.min(w / gridW, h / gridH);
  const r1 = n => Math.round(n * 10) / 10;
  return {
    block: r1(block),
    text: "block " + r1(block) + " mm · drawing " + Math.round(block * gridW) +
      " × " + Math.round(block * gridH) + " mm · " + label
  };
}

// ---------- color quantization (median cut) ----------

function medianCut(colors, k) {
  // colors: flat array of [r,g,b] per cell (duplicates included, so boxes are population-weighted)
  let boxes = [colors];
  const rangeOf = box => {
    const min = [255, 255, 255], max = [0, 0, 0];
    for (const c of box) for (let i = 0; i < 3; i++) {
      if (c[i] < min[i]) min[i] = c[i];
      if (c[i] > max[i]) max[i] = c[i];
    }
    let axis = 0, range = -1;
    for (let i = 0; i < 3; i++) if (max[i] - min[i] > range) { range = max[i] - min[i]; axis = i; }
    return { axis, range };
  };
  while (boxes.length < k) {
    let bestIdx = -1, bestScore = 0, bestAxis = 0;
    boxes.forEach((box, i) => {
      if (box.length < 2) return;
      const { axis, range } = rangeOf(box);
      const score = range * Math.log(box.length + 1);
      if (score > bestScore) { bestScore = score; bestIdx = i; bestAxis = axis; }
    });
    if (bestIdx < 0) break; // no box can be split further
    const box = boxes.splice(bestIdx, 1)[0];
    box.sort((a, b) => a[bestAxis] - b[bestAxis]);
    const mid = box.length >> 1;
    boxes.push(box.slice(0, mid), box.slice(mid));
  }
  return boxes.map(box => {
    let r = 0, g = 0, b = 0;
    for (const c of box) { r += c[0]; g += c[1]; b += c[2]; }
    const n = box.length;
    return { r: Math.round(r / n), g: Math.round(g / n), b: Math.round(b / n), count: n };
  });
}

const nearestIdx = (c, pal) => {
  let best = 0, bestD = Infinity;
  for (let i = 0; i < pal.length; i++) {
    const dr = c[0] - pal[i].r, dg = c[1] - pal[i].g, db = c[2] - pal[i].b;
    const d = dr * dr + dg * dg + db * db;
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
};

const luminance = c => 0.299 * c.r + 0.587 * c.g + 0.114 * c.b;
const toHex = c => "#" + [c.r, c.g, c.b].map(v => v.toString(16).padStart(2, "0")).join("");

// ---------- main render ----------

function render() {
  if (!sourceImg) return;

  const gridW = +gridSizeEl.value;
  const gridH = Math.max(1, Math.round(gridW * sourceImg.naturalHeight / sourceImg.naturalWidth));
  const k = +numColorsEl.value;

  // 1. Downscale: each grid cell = average color of that photo area (white under transparency)
  const small = document.createElement("canvas");
  small.width = gridW; small.height = gridH;
  const sctx = small.getContext("2d", { willReadFrequently: true });
  sctx.fillStyle = "#fff";
  sctx.fillRect(0, 0, gridW, gridH);
  sctx.drawImage(sourceImg, 0, 0, gridW, gridH);
  const data = sctx.getImageData(0, 0, gridW, gridH).data;

  const cells = [];
  for (let i = 0; i < gridW * gridH; i++) {
    cells.push([data[i * 4], data[i * 4 + 1], data[i * 4 + 2]]);
  }

  // 2. Quantize to k colors, number them light -> dark
  palette = medianCut(cells.slice(), k);
  palette.forEach(p => { p.hex = toHex(p); });
  // merge boxes that averaged to the same color, so every number is a distinct paint color
  const byHex = new Map();
  for (const p of palette) {
    const seen = byHex.get(p.hex);
    if (seen) seen.count += p.count; else byHex.set(p.hex, p);
  }
  palette = [...byHex.values()];
  palette.sort((a, b) => luminance(b) - luminance(a));
  const cellIdx = cells.map(c => nearestIdx(c, palette));

  // 3. Draw the big grid
  const numbered = numberedEl.checked;
  const lines = gridLinesEl.checked;
  outCanvas.width = gridW * CELL;
  outCanvas.height = gridH * CELL;
  const ctx = outCanvas.getContext("2d");

  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      const p = palette[cellIdx[y * gridW + x]];
      ctx.fillStyle = p.hex;
      ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
    }
  }

  if (lines) {
    ctx.strokeStyle = "rgba(0,0,0,0.35)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = 0; x <= gridW; x++) { ctx.moveTo(x * CELL + 0.5, 0); ctx.lineTo(x * CELL + 0.5, gridH * CELL); }
    for (let y = 0; y <= gridH; y++) { ctx.moveTo(0, y * CELL + 0.5); ctx.lineTo(gridW * CELL, y * CELL + 0.5); }
    ctx.stroke();
  }

  if (numbered) {
    ctx.font = "600 " + Math.round(CELL * 0.42) + "px Consolas, monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const idx = cellIdx[y * gridW + x];
        ctx.fillStyle = luminance(palette[idx]) > 140 ? "rgba(0,0,0,0.75)" : "rgba(255,255,255,0.85)";
        ctx.fillText(String(idx + 1), x * CELL + CELL / 2, y * CELL + CELL / 2 + 1);
      }
    }
  }

  // 4. UI: legend + info
  placeholder.style.display = "none";
  outCanvas.style.display = "block";
  downloadBtn.disabled = false;
  const paper = paperInfo(gridW, gridH);
  infoEl.textContent = gridW + " × " + gridH + " blocks · " + palette.length + " colors" +
    (paper ? " · " + paper.text : "");

  legendEl.innerHTML = "<h3>Color legend</h3>";
  palette.forEach((p, i) => {
    const row = document.createElement("div");
    row.className = "swatch-row";
    row.innerHTML = '<span class="num">' + (i + 1) + '</span>' +
      '<span class="sw" style="background:' + p.hex + '"></span>' +
      '<span class="hex">' + p.hex + '</span>';
    legendEl.appendChild(row);
  });
}
window.render = render;

// ---------- download (grid + legend strip when numbered) ----------

downloadBtn.addEventListener("click", () => {
  const numbered = numberedEl.checked;
  const gridW = outCanvas.width / CELL, gridH = outCanvas.height / CELL;
  const paper = paperInfo(gridW, gridH);
  const legendRow = 52, legendPad = 16;
  const paperH2 = paper ? 44 : 0;
  const legendH = (numbered ? legendPad * 2 + palette.length * legendRow : 0) + paperH2;

  const dl = document.createElement("canvas");
  dl.width = outCanvas.width;
  dl.height = outCanvas.height + legendH;
  const ctx = dl.getContext("2d");
  ctx.drawImage(outCanvas, 0, 0);

  if (legendH) {
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, outCanvas.height, dl.width, legendH);
    ctx.textBaseline = "middle";
  }

  if (paper) {
    ctx.fillStyle = "#222";
    ctx.font = "600 22px Consolas, monospace";
    ctx.textAlign = "left";
    ctx.fillText(paper.text, 24, outCanvas.height + paperH2 / 2);
  }

  if (numbered) {
    palette.forEach((p, i) => {
      const y = outCanvas.height + paperH2 + legendPad + i * legendRow + legendRow / 2;
      ctx.font = "600 24px Consolas, monospace";
      ctx.fillStyle = "#222";
      ctx.textAlign = "right";
      ctx.fillText(String(i + 1), 56, y);
      ctx.fillStyle = p.hex;
      ctx.fillRect(72, y - 16, 64, 32);
      ctx.strokeStyle = "#999";
      ctx.strokeRect(72.5, y - 15.5, 63, 31);
      ctx.fillStyle = "#222";
      ctx.textAlign = "left";
      ctx.font = "20px Consolas, monospace";
      ctx.fillText(p.hex, 152, y);
    });
  }

  const name = tsName();
  dl.toBlob(blob => {
    const a = document.createElement("a");
    a.download = name;
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    saveToHistory(name, blob);
  }, "image/png");
});

// ---------- history (real folder via File System Access API, browser storage as fallback) ----------

const folderBtn = document.getElementById("folderBtn");
const historyNote = document.getElementById("historyNote");
const galleryEl = document.getElementById("gallery");
const viewerEl = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");
const viewerName = document.getElementById("viewerName");

let historyDir = null; // FileSystemDirectoryHandle when a folder is connected

function tsName() {
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return "pixel-portrait-" + d.getFullYear() + p(d.getMonth() + 1) + p(d.getDate()) +
    "-" + p(d.getHours()) + p(d.getMinutes()) + p(d.getSeconds()) + ".png";
}

// tiny IndexedDB wrapper: "kv" persists the folder handle, "files" is the fallback store
function idb() {
  return new Promise((res, rej) => {
    const req = indexedDB.open("pixel-portrait", 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore("kv");
      req.result.createObjectStore("files");
    };
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function dbOp(store, mode, fn) {
  const db = await idb();
  return new Promise((res, rej) => {
    const rq = fn(db.transaction(store, mode).objectStore(store));
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
const dbGet = (s, k) => dbOp(s, "readonly", os => os.get(k));
const dbPut = (s, k, v) => dbOp(s, "readwrite", os => os.put(v, k));
const dbDel = (s, k) => dbOp(s, "readwrite", os => os.delete(k));
async function dbEntries(s) {
  const keys = await dbOp(s, "readonly", os => os.getAllKeys());
  const vals = await dbOp(s, "readonly", os => os.getAll());
  return keys.map((k, i) => [k, vals[i]]);
}

async function saveToHistory(name, blob) {
  try {
    if (historyDir) {
      const fh = await historyDir.getFileHandle(name, { create: true });
      const w = await fh.createWritable();
      await w.write(blob);
      await w.close();
    } else {
      await dbPut("files", name, blob);
    }
    refreshGallery();
  } catch (e) {
    historyNote.textContent = "Could not save to history: " + e.message;
  }
}
window.saveToHistory = saveToHistory;

async function getHistory() {
  const items = [];
  if (historyDir) {
    for await (const entry of historyDir.values()) {
      if (entry.kind === "file" && /\.(png|jpe?g|webp|gif|bmp)$/i.test(entry.name)) {
        items.push({ name: entry.name, blob: await entry.getFile() });
      }
    }
  } else {
    for (const [name, blob] of await dbEntries("files")) items.push({ name, blob });
  }
  items.sort((a, b) => b.name.localeCompare(a.name)); // timestamped names: newest first
  return items;
}

let galleryUrls = [];
async function refreshGallery() {
  const items = await getHistory();
  galleryUrls.forEach(u => URL.revokeObjectURL(u));
  galleryUrls = [];
  galleryEl.innerHTML = "";
  for (const item of items) {
    const url = URL.createObjectURL(item.blob);
    galleryUrls.push(url);
    const div = document.createElement("div");
    div.className = "g-item";
    div.title = item.name;
    const img = document.createElement("img");
    img.src = url;
    img.alt = item.name;
    const del = document.createElement("button");
    del.className = "g-del";
    del.textContent = "×";
    del.title = "Delete";
    del.addEventListener("click", async e => {
      e.stopPropagation();
      if (!confirm("Delete " + item.name + "?")) return;
      if (historyDir) await historyDir.removeEntry(item.name);
      else await dbDel("files", item.name);
      refreshGallery();
    });
    div.addEventListener("click", () => openViewer(item));
    div.append(img, del);
    galleryEl.appendChild(div);
  }
}
window.refreshGallery = refreshGallery;

let viewerItem = null;
function openViewer(item) {
  viewerItem = item;
  viewerImg.src = URL.createObjectURL(item.blob);
  viewerName.textContent = item.name;
  viewerEl.hidden = false;
}
function closeViewer() {
  viewerEl.hidden = true;
  URL.revokeObjectURL(viewerImg.src);
  viewerImg.src = "";
}
document.getElementById("viewerClose").addEventListener("click", closeViewer);
viewerEl.addEventListener("click", e => { if (e.target === viewerEl) closeViewer(); });
document.getElementById("viewerDl").addEventListener("click", () => {
  if (!viewerItem) return;
  const a = document.createElement("a");
  a.download = viewerItem.name;
  a.href = URL.createObjectURL(viewerItem.blob);
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
});

folderBtn.addEventListener("click", async () => {
  try {
    const stored = await dbGet("kv", "dir");
    if (stored && !historyDir &&
        (await stored.requestPermission({ mode: "readwrite" })) === "granted") {
      historyDir = stored; // reconnect the folder from last time
    } else {
      historyDir = await window.showDirectoryPicker({ mode: "readwrite" });
      await dbPut("kv", "dir", historyDir);
    }
    folderBtn.textContent = "Change history folder";
    historyNote.textContent = "Saving to folder: " + historyDir.name;
    refreshGallery();
  } catch (e) { /* picker cancelled */ }
});

async function initHistory() {
  if (!window.showDirectoryPicker) {
    folderBtn.style.display = "none";
    historyNote.textContent = "History is saved inside this browser.";
  } else {
    const stored = await dbGet("kv", "dir").catch(() => null);
    if (stored) {
      if ((await stored.queryPermission({ mode: "readwrite" })) === "granted") {
        historyDir = stored;
        folderBtn.textContent = "Change history folder";
        historyNote.textContent = "Saving to folder: " + stored.name;
      } else {
        folderBtn.textContent = "Reconnect “" + stored.name + "” folder";
        historyNote.textContent = "Click to keep saving into your folder.";
      }
    } else {
      historyNote.textContent = "Pick a folder on this computer — every created image is saved there and shown below.";
    }
  }
  refreshGallery();
}
initHistory();
</script>
</body>
